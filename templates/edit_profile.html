<!DOCTYPE html>
<html>
<head>

<title>Edit Profile</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h2>Edit Profile</h2>

<form method="POST">

<input type="text"
name="phone"
placeholder="Phone Number"
value="{{ profile[2] if profile else '' }}"
required>

<br><br>

<input type="number"
name="age"
placeholder="Age"
value="{{ profile[3] if profile else '' }}"
required>

<br><br>

<select name="gender">

<option value="Male">Male</option>

<option value="Female">Female</option>

<option value="Other">Other</option>

</select>

<br><br>

<input type="text"
name="address"
placeholder="Address"
value="{{ profile[5] if profile else '' }}"
required>

<br><br>

<input type="text"
name="blood_group"
placeholder="Blood Group"
value="{{ profile[6] if profile else '' }}"
required>

<br><br>

<button type="submit">

Save Profile

</button>

</form>

</div>

</body>
</html>
